<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSP Diário de Bordo</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#05070b">

<style>
body{
    font-family:Arial,sans-serif;
    background:#05070b;
    color:white;
    padding:20px;
}

.card{
    background:#111827;
    padding:20px;
    border-radius:20px;
    margin-bottom:20px;
}

.task{
    margin:12px 0;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:16px;
    background:#1f8fff;
    color:white;
    font-size:16px;
}

.reset{
    margin-top:10px;
    background:none;
    color:#7fa8d6;
}
</style>
</head>

<body>

<h1>SSP • Diário Operacional</h1>

<div class="card">

<div class="task">
<input type="checkbox" class="check"> Limpeza e organização
</div>

<div class="task">
<input type="checkbox" class="check"> Ronda emergenciais
</div>

<div class="task">
<input type="checkbox" class="check"> Abastecimento fábrica
</div>

<div class="task">
<input type="checkbox" class="check"> Esvaziar lixeiras
</div>

<div class="task">
<input type="checkbox" class="check"> Abastecimento açúcar sala massa
</div>

</div>

<div class="card">

<textarea id="nota" placeholder="Anotações..." style="width:100%;height:100px;border-radius:12px;padding:10px;"></textarea>

</div>

<button onclick="encerrarTurno()">
✅ Encerrar Turno
</button>

<button class="reset" onclick="resetarTurno()">
resetar turno
</button>

<script>

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
}

const hoje = new Date().toLocaleDateString('pt-BR');

if(localStorage.getItem('ssp_turno') === hoje){
    bloquear();
}

function bloquear(){

    document.querySelectorAll('input,textarea').forEach(el=>{
        el.disabled = true;
    });

}

function encerrarTurno(){

    localStorage.setItem('ssp_turno', hoje);

    let faltando = [];

    document.querySelectorAll('.task').forEach(task=>{

        const check = task.querySelector('input');

        if(!check.checked){
            faltando.push(task.innerText.trim());
        }

    });

    let msg = 'Turno encerrado.\n\n';

    if(faltando.length > 0){

        msg += 'Pendências:\n';

        faltando.forEach(item=>{
            msg += '- ' + item + '\n';
        });

    }else{
        msg += 'Nenhuma pendência.';
    }

    alert(msg);

    bloquear();

}

function resetarTurno(){

    localStorage.removeItem('ssp_turno');

    location.reload();

}

</script>

</body>
</html>
